<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Metrics Platform — Advanced Analytics Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --bg-main: #05070f;
            --bg-card: rgba(11, 15, 28, 0.45);
            --bg-card-hover: rgba(15, 20, 38, 0.6);
            --bg-panel: #080b13;
            --bg-input: #121622;
            --text-main: #ffffff;
            --text-muted: #6b7280;
            --text-body: #d1d5db;
            --border-alpha: rgba(255, 255, 255, 0.03);
            --border-alpha-heavy: rgba(255, 255, 255, 0.06);
            --accent-primary: #3b82f6;
            --accent-primary-glow: rgba(59, 130, 246, 0.15);
            --shadow-intensity: rgba(0, 0, 0, 0.6);
            --blur-radius: 20px;
            --transition-speed: 0.4s;
        }

        [data-theme="light"] {
            --bg-main: #f4f6fa;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-panel: #ffffff;
            --bg-input: #f1f3f7;
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --text-body: #334155;
            --border-alpha: rgba(15, 23, 42, 0.04);
            --border-alpha-heavy: rgba(15, 23, 42, 0.08);
            --accent-primary-glow: rgba(59, 130, 246, 0.12);
            --shadow-intensity: rgba(15, 23, 42, 0.05);
        }

        body.battery-saving {
            --blur-radius: 0px !important;
            --accent-primary-glow: transparent !important;
            --transition-speed: 0s !important;
            background-image: none !important;
        }

        body.mode-humans { --accent-primary: #3b82f6; }
        body.mode-dogs { --accent-primary: #f59e0b; }
        body.mode-cats { --accent-primary: #ec4899; }
        body.mode-rats { --accent-primary: #8b5cf6; }
        body.mode-fishes { --accent-primary: #14b8a6; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-primary-glow) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.03) 0px, transparent 45%);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 2rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .ai-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--accent-primary-glow);
        }

        .ai-btn:hover {
            color: var(--text-main);
            border-color: var(--accent-primary);
            background: var(--accent-primary-glow);
            transform: scale(1.05);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.75px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--accent-primary);
            transition: color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .live-indicator {
            background: rgba(16, 185, 129, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
        }

        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        body.battery-saving .dot { animation: none !important; }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .settings-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            color: var(--text-main);
            border-color: var(--accent-primary);
            transform: rotate(45deg);
        }

        .container {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4.5rem;
        }

        .toggle-wrapper {
            display: flex;
            justify-content: center;
        }

        .toggle-container {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            padding: 0.4rem;
            border-radius: 100px;
            display: flex;
            position: relative;
            box-shadow: 0 20px 40px var(--shadow-intensity);
            width: 680px;
            backdrop-filter: blur(var(--blur-radius));
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            flex: 1;
            padding: 0.7rem 0;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 100px;
            z-index: 2;
            text-align: center;
            transition: color 0.3s ease;
        }

        .toggle-btn.active { color: #ffffff !important; }

        .toggle-slider {
            position: absolute;
            top: 0.4rem;
            left: 0.4rem;
            bottom: 0.4rem;
            width: calc(20% - 0.5rem);
            background: var(--accent-primary);
            border-radius: 100px;
            transition: transform var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1), background var(--transition-speed) ease;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        body.mode-humans .toggle-slider { transform: translateX(0%); }
        body.mode-dogs .toggle-slider { transform: translateX(100%); }
        body.mode-cats .toggle-slider { transform: translateX(200%); }
        body.mode-rats .toggle-slider { transform: translateX(300%); }
        body.mode-fishes .toggle-slider { transform: translateX(400%); }

        .counter-section {
            text-align: center;
            position: relative;
        }

        .counter-section h1 {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .counter-wrapper {
            display: inline-block;
            position: relative;
            padding: 1rem 0;
        }

        .counter {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 9vw, 7.5rem);
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -2px;
            line-height: 0.95;
            background: linear-gradient(180deg, var(--text-main) 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 130%;
            background: radial-gradient(var(--accent-primary-glow) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
            transition: background var(--transition-speed) ease;
            filter: blur(20px);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 1.5rem;
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.75rem;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-alpha);
            border-radius: 32px;
            padding: 2.5rem 2.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px var(--shadow-intensity);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-alpha-heavy);
            background: var(--bg-card-hover);
            box-shadow: 0 30px 60px var(--shadow-intensity);
        }

        .stat-card-border-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            opacity: 0.8;
        }

        .stat-card.births .stat-card-border-track { background: linear-gradient(90deg, #10b981, transparent 80%); }
        .stat-card.deaths .stat-card-border-track { background: linear-gradient(90deg, #ef4444, transparent 80%); }
        .stat-card.growth .stat-card-border-track { background: linear-gradient(90deg, var(--accent-primary), transparent 80%); }

        .stat-card h3 {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .stat-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.75rem;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .stat-card.births .stat-number { color: #10b981; }
        .stat-card.deaths .stat-number { color: #f87171; }

        .stat-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: auto;
            font-weight: 500;
        }

        /* Sidebar AI Config */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 4, 9, 0.6);
            backdrop-filter: blur(8px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-speed) ease;
        }

        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

        .sidebar {
            position: absolute;
            top: 0;
            left: -480px;
            width: 100%;
            max-width: 460px;
            height: 100%;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-alpha-heavy);
            box-shadow: 30px 0 60px var(--shadow-intensity);
            padding: 3rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            transition: left var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
        }

        .sidebar-overlay.open .sidebar { left: 0; }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .ai-badge {
            background: var(--accent-primary-glow);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .ai-content-box {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha);
            border-radius: 24px;
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
            color: var(--text-body);
            font-size: 0.9rem;
        }

        .ai-struct-item {
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-alpha-heavy);
            padding-bottom: 1rem;
        }
        .ai-struct-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .ai-struct-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent-primary); letter-spacing: 1px; margin-bottom: 0.25rem; }
        .ai-struct-body { line-height: 1.5; color: var(--text-body); }

        /* Modals Generic Mod */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 4, 9, 0.6);
            backdrop-filter: blur(16px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
        }

        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 36px;
            padding: 2.5rem;
            width: 92%;
            max-width: 440px;
            transform: scale(0.92);
            transition: all var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 30px 60px var(--shadow-intensity);
        }

        .modal-overlay.open .modal { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-header h2 { font-size: 1.25rem; font-weight: 600; font-family: 'Space Grotesk', sans-serif; color: var(--text-main); }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover { color: var(--text-main); border-color: var(--accent-primary); }
        .form-group { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .form-group.hidden { display: none !important; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        .select-input {
            background: var(--bg-input);
            border: 1px solid var(--border-alpha-heavy);
            color: var(--text-main);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 16px;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            border-top: 1px solid var(--border-alpha);
            background: rgba(3, 4, 9, 0.1);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            header { padding: 2rem 1.5rem; }
            .container { padding: 0 1.25rem 4rem 1.25rem; gap: 3.5rem; }
            .toggle-container { width: 100%; max-width: 520px; flex-wrap: wrap; border-radius: 24px; }
            .toggle-slider { display: none; }
            .toggle-btn { flex: 1 1 30%; padding: 0.6rem 0; border-radius: 8px; font-size: 0.8rem; }
            .toggle-btn.active { background: var(--accent-primary); }
            .counter { font-size: clamp(2.3rem, 8vw, 4rem); }
            .sidebar { max-width: 100%; left: -100%; }
        }
    </style>
</head>
<body data-theme="dark">

    <header>
        <div class="header-left">
            <button class="ai-btn" onclick="toggleSidebar(true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
            </button>
            <div class="logo">Global<span>Metrics</span></div>
        </div>
        <div class="header-actions">
            <div id="live-tag" class="live-indicator"><span class="dot"></span> LIVE METRICS</div>
            <button class="settings-btn" onclick="toggleModal(true)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="toggle-wrapper">
            <div class="toggle-container">
                <div class="toggle-slider"></div>
                <button id="tab-humans" class="toggle-btn" onclick="setMode('humans')">...</button>
                <button id="tab-dogs" class="toggle-btn" onclick="setMode('dogs')">...</button>
                <button id="tab-cats" class="toggle-btn" onclick="setMode('cats')">...</button>
                <button id="tab-rats" class="toggle-btn" onclick="setMode('rats')">...</button>
                <button id="tab-fishes" class="toggle-btn" onclick="setMode('fishes')">...</button>
            </div>
        </div>

        <section class="counter-section">
            <h1 id="main-heading">...</h1>
            <div class="counter-wrapper">
                <div class="counter-glow"></div>
                <div id="main-counter" class="counter">0</div>
            </div>
            <p id="main-subtitle" class="subtitle">...</p>
        </section>

        <section class="stats-grid">
            <div class="stat-card births">
                <div class="stat-card-border-track"></div>
                <h3 id="label-births">...</h3>
                <div id="stat-births" class="stat-number">0</div>
                <div id="meta-births" class="stat-meta">...</div>
            </div>
            <div class="stat-card deaths">
                <div class="stat-card-border-track"></div>
                <h3 id="label-deaths">...</h3>
                <div id="stat-deaths" class="stat-number">0</div>
                <div id="meta-deaths" class="stat-meta">...</div>
            </div>
            <div class="stat-card growth">
                <div class="stat-card-border-track"></div>
                <h3 id="label-growth">...</h3>
                <div id="stat-growth" class="stat-number">0</div>
                <div id="meta-growth" class="stat-meta">...</div>
            </div>
        </section>
    </main>

    <div id="ai-sidebar" class="sidebar-overlay" onclick="toggleSidebar(false)">
        <div class="sidebar" onclick="event.stopPropagation()">
            <div class="ai-header">
                <div class="ai-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 7.54 16.59A4 4 0 0 1 16 22H8a4 4 0 0 1-3.54-3.41A10 10 0 0 1 12 2z"></path></svg>
                    <span id="ai-title-text">AI Consultant</span>
                    <span class="ai-badge">v6.0</span>
                </div>
                <button class="close-btn" onclick="toggleSidebar(false)">&times;</button>
            </div>
            <div id="ai-content" class="ai-content-box">
                </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" onclick="toggleModal(false)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Options</h2>
                <button class="close-btn" onclick="toggleModal(false)">&times;</button>
            </div>
            <div class="form-group">
                <label id="label-lang">Select Language</label>
                <select class="select-input" onchange="setLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="pt">Português</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="ja">日本語</option>
                    <option value="ru">Русский</option>
                </select>
            </div>
            <div class="form-group">
                <label id="label-theme">Interface Theme</label>
                <select class="select-input" onchange="setTheme(this.value)">
                    <option value="dark">Dark Theme</option>
                    <option value="light">Light Theme</option>
                </select>
            </div>
            <div id="battery-saving-group" class="form-group hidden">
                <label id="label-battery">Battery Optimization (Mobile)</label>

        // Detect Mobile Environment to inject Battery Optimization Group
        function detectMobileDevice() {
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isTouch || isMobileUA) {
                document.getElementById('battery-saving-group').classList.remove('hidden');
            }
        }

        function toggleModal(open) { document.getElementById('settings-modal').classList.toggle('open', open); }
        function toggleSidebar(open) { 
            document.getElementById('ai-sidebar').classList.toggle('open', open); 
            if(open) { renderAiContent(); }
        }

        function setTheme(theme) { document.body.setAttribute('data-theme', theme); }

        function setBatterySaving(mode) {
            if(mode === 'on') {
                batterySavingActive = true;
                updateInterval = 500; // Drop calculation sample frequency to save CPU cycles
                document.body.classList.add('battery-saving');
            } else {
                batterySavingActive = false;
                updateInterval = 100; // standard 10Hz
                document.body.classList.remove('battery-saving');
            }
            resetMetricTimer();
        }

        function setLanguage(lang) {
            currentLang = lang;
            const ui = translationTable[lang];
            
            document.getElementById('live-tag').innerHTML = ui.liveTag;
            document.getElementById('modal-title').innerText = ui.modalTitle;
            document.getElementById('label-lang').innerText = ui.labelLang;
            document.getElementById('label-theme').innerText = ui.labelTheme;
            document.getElementById('label-battery').innerText = ui.labelBattery;
            document.getElementById('label-growth').innerText = ui.labelGrowth;
            document.getElementById('meta-growth').innerText = ui.metaGrowth;
            document.getElementById('ai-title-text').innerText = ui.aiTitleText;
            
            document.getElementById('tab-humans').innerText = ui.tabHumans;
            document.getElementById('tab-dogs').innerText = ui.tabDogs;
            document.getElementById('tab-cats').innerText = ui.tabCats;
            document.getElementById('tab-rats').innerText = ui.tabRats;
            document.getElementById('tab-fishes').innerText = ui.tabFishes;

            renderTextContent();
            if (document.getElementById('ai-sidebar').classList.contains('open')) { renderAiContent(); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-humans').classList.toggle('active', mode === 'humans');
            document.getElementById('tab-dogs').classList.toggle('active', mode === 'dogs');
            document.getElementById('tab-cats').classList.toggle('active', mode === 'cats');
            document.getElementById('tab-rats').classList.toggle('active', mode === 'rats');
            document.getElementById('tab-fishes').classList.toggle('active', mode === 'fishes');
            
            document.body.className = batterySavingActive ? `mode-${mode} battery-saving` : `mode-${mode}`;
            renderTextContent();
            if (document.getElementById('ai-sidebar').classList.contains('open')) { renderAiContent(); }
        }

        function renderAiContent() {
            const aiData = datasets[currentMode].aiInsights[currentLang];
            const labels = translationTable[currentLang].aiLabels;
            
            let html = `
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct1}</div>
                    <div class="ai-struct-body">${aiData[0]}</div>
                </div>
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct2}</div>
                    <div class="ai-struct-body">${aiData[1]}</div>
                </div>
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct3}</div>
                    <div class="ai-struct-body">${aiData[2]}</div>
                </div>
            `;
            document.getElementById('ai-content').innerHTML = html;
        }

        function renderTextContent() {
            const data = datasets[currentMode].translations[currentLang];
            document.getElementById('main-heading').innerText = data.heading;
            document.getElementById('main-subtitle').innerText = data.subtitle;
            document.getElementById('label-births').innerText = data.labelBirths;
            document.getElementById('label-deaths').innerText = data.labelDeaths;
            document.getElementById('meta-births').innerText = data.metaBirths;
            document.getElementById('meta-deaths').innerText = data.metaDeaths;
            document.getElementById('footer-text').innerHTML = data.footer;
            updateMetrics();
        }

        function formatNumber(num) {
            const locale = translationTable[currentLang].langLocale;
            return Math.floor(num).toLocaleString(locale);
        }

        function updateMetrics() {
            const data = datasets[currentMode];
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const secondsPassedToday = (now.getTime() - startOfDay) / 1000;

            const netGrowthPerSecond = data.birthsPerSecond - data.deathsPerSecond;
            const currentPopulation = data.basePopulation + (secondsPassedToday * netGrowthPerSecond);
            
            const birthsToday = secondsPassedToday * data.birthsPerSecond;
            const deathsToday = secondsPassedToday * data.deathsPerSecond;
            const growthToday = birthsToday - deathsToday;

            document.getElementById('main-counter').innerText = formatNumber(currentPopulation);
            document.getElementById('stat-births').innerText = formatNumber(birthsToday);
            document.getElementById('stat-deaths').innerText = formatNumber(deathsToday);
            document.getElementById('stat-growth').innerText = formatNumber(growthToday);
        }

        let metricLoop;
        function resetMetricTimer() {
            clearInterval(metricLoop);
            metricLoop = setInterval(updateMetrics, updateInterval);
        }

        // Init
        detectMobileDevice();
        setLanguage('en');
        setMode('humans');
        resetMetricTimer();
    </script>
</body>
</html>
