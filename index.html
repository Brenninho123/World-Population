<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Population - Live Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #3b82f6;
        }

        .live-indicator {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .live-indicator .dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .container {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4rem;
        }

        .counter-section {
            text-align: center;
        }

        .counter-section h1 {
            font-size: 1.25rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .counter {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }

        #births-today { color: #10b981; }
        #deaths-today { color: #ef4444; }
        #growth-today { color: #3b82f6; }

        footer {
            text-align: center;
            padding: 2rem;
            color: #4b5563;
            font-size: 0.85rem;
            border-top: 1px solid #1f2937;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">World<span>Population</span></div>
        <div class="live-indicator"><span class="dot"></span> LIVE</div>
    </header>

    <main class="container">
        <section class="counter-section">
            <h1>Estimated World Population</h1>
            <div id="population-counter" class="counter">8,118,500,000</div>
            <p class="subtitle">People on Earth right now</p>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Births today</h3>
                <p id="births-today" class="stat-number">+0</p>
            </div>
            <div class="stat-card">
                <h3>Deaths today</h3>
                <p id="deaths-today" class="stat-number">-0</p>
            </div>
            <div class="stat-card">
                <h3>Net growth today</h3>
                <p id="growth-today" class="stat-number">+0</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 World Population Tracker. Based on current global demographic estimates.</p>
    </footer>

    <script>
        const basePopulation = 8118500000; 
        const birthsPerSecond = 4.3;
        const deathsPerSecond = 1.9;

        function formatNumber(num) {
            return Math.floor(num).toLocaleString('en-US');
        }

        function updatePopulation() {
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const millisecondsPassedToday = now.getTime() - startOfDay;
            const secondsPassedToday = millisecondsPassedToday / 1000;

            const netGrowthPerSecond = birthsPerSecond - deathsPerSecond;
            const currentPopulation = basePopulation + (secondsPassedToday * netGrowthPerSecond);
            
            const birthsToday = secondsPassedToday * birthsPerSecond;
            const deathsToday = secondsPassedToday * deathsPerSecond;
            const growthToday = birthsToday - deathsToday;

            document.getElementById('population-counter').innerText = formatNumber(currentPopulation);
            document.getElementById('births-today').innerText = `+${formatNumber(birthsToday)}`;
            document.getElementById('deaths-today').innerText = `-${formatNumber(deathsToday)}`;
            document.getElementById('growth-today').innerText = `+${formatNumber(growthToday)}`;
        }

        setInterval(updatePopulation, 100);
        updatePopulation();
    </script>
</body>
</html>
