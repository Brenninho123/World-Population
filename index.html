<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Metrics Platform — Cyber-Metrics OS v9</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --bg-main: #05070f;
            --bg-card: rgba(11, 15, 28, 0.45);
            --bg-card-hover: rgba(15, 20, 38, 0.6);
            --bg-panel: #080b13;
            --bg-input: #121622;
            --text-main: #ffffff;
            --text-muted: #6b7280;
            --text-body: #d1d5db;
            --border-alpha: rgba(255, 255, 255, 0.03);
            --border-alpha-heavy: rgba(255, 255, 255, 0.06);
            --accent-primary: #3b82f6;
            --accent-primary-glow: rgba(59, 130, 246, 0.15);
            --shadow-intensity: rgba(0, 0, 0, 0.6);
            --blur-radius: 20px;
            --animation-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        [data-theme="light"] {
            --bg-main: #f4f6fa;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-panel: #ffffff;
            --bg-input: #f1f3f7;
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --text-body: #334155;
            --border-alpha: rgba(15, 23, 42, 0.04);
            --border-alpha-heavy: rgba(15, 23, 42, 0.08);
            --accent-primary-glow: rgba(59, 130, 246, 0.12);
            --shadow-intensity: rgba(15, 23, 42, 0.05);
        }

        body.battery-saving * {
            animation: none !important;
            transition: none !important;
            backdrop-filter: none !important;
            box-shadow: none !important;
        }
        body.battery-saving {
            --blur-radius: 0px !important;
            --accent-primary-glow: transparent !important;
            background-image: none !important;
        }

        body.mode-humans { --accent-primary: #3b82f6; }
        body.mode-dogs { --accent-primary: #f59e0b; }
        body.mode-cats { --accent-primary: #ec4899; }
        body.mode-rats { --accent-primary: #8b5cf6; }
        body.mode-fishes { --accent-primary: #14b8a6; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-primary-glow) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.03) 0px, transparent 45%);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Re-engineered Performance Overlay Layout */
        #fps-hud {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(5, 7, 15, 0.85);
            border: 1px solid var(--border-alpha-heavy);
            padding: 5px 12px;
            border-radius: 8px;
            font-family: 'Space Grotesk', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            color: #10b981;
            z-index: 9999;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        #fps-hud span.separator { color: var(--text-muted); padding: 0 4px; font-weight: 400; }
        #fps-hud span.val { color: var(--text-main); font-weight: 500; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.75px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--accent-primary);
            transition: color 0.4s ease;
        }

        .main-option-nav {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            padding: 0.35rem;
            border-radius: 14px;
            display: flex;
            position: relative;
            backdrop-filter: blur(var(--blur-radius));
            box-shadow: 0 10px 25px var(--shadow-intensity);
        }

        .main-opt-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            z-index: 2;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .main-opt-btn.active { color: #ffffff !important; }

        .main-opt-slider {
            position: absolute;
            top: 0.35rem;
            left: 0.35rem;
            bottom: 0.35rem;
            width: calc(50% - 0.35rem);
            background: var(--accent-primary);
            border-radius: 10px;
            transition: transform 0.4s var(--animation-curve), background 0.4s ease;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }

        .view-timezone .main-opt-slider { transform: translateX(100%); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .ai-btn, .settings-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--animation-curve);
        }

        .ai-btn { color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-primary-glow); }

        .ai-btn:hover { color: var(--text-main); border-color: var(--accent-primary); background: var(--accent-primary-glow); transform: scale(1.08); }
        .settings-btn:hover { color: var(--text-main); border-color: var(--accent-primary); transform: rotate(45deg) scale(1.05); }

        .live-indicator {
            background: rgba(16, 185, 129, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .container {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4rem;
        }

        .app-view-screen {
            display: none;
            flex-direction: column;
            gap: 4rem;
            animation: viewFadeIn 0.5s var(--animation-curve) forwards;
        }

        .app-view-screen.active-screen { display: flex; }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toggle-wrapper { display: flex; justify-content: center; }

        .toggle-container {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            padding: 0.4rem;
            border-radius: 100px;
            display: flex;
            position: relative;
            box-shadow: 0 20px 40px var(--shadow-intensity);
            width: 680px;
            backdrop-filter: blur(var(--blur-radius));
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            flex: 1;
            padding: 0.7rem 0;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 100px;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .toggle-btn.active { color: #ffffff !important; }

        .toggle-slider {
            position: absolute;
            top: 0.4rem; left: 0.4rem; bottom: 0.4rem;
            width: calc(20% - 0.5rem);
            background: var(--accent-primary);
            border-radius: 100px;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), background 0.4s ease;
            z-index: 1;
        }

        body.mode-humans .toggle-slider { transform: translateX(0%); }
        body.mode-dogs .toggle-slider { transform: translateX(100%); }
        body.mode-cats .toggle-slider { transform: translateX(200%); }
        body.mode-rats .toggle-slider { transform: translateX(300%); }
        body.mode-fishes .toggle-slider { transform: translateX(400%); }

        .counter-section { text-align: center; position: relative; }
        .counter-section h1 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; font-weight: 700; margin-bottom: 1rem; }

        .counter-wrapper { display: inline-block; position: relative; padding: 1rem 0; }

        .counter {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 9vw, 7.5rem);
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -2px;
            line-height: 0.95;
            background: linear-gradient(180deg, var(--text-main) 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter.pulse-light { animation: textUpdatePulse 0.4s ease; }

        @keyframes textUpdatePulse {
            0% { opacity: 0.88; transform: scale(0.995); }
            100% { opacity: 1; transform: scale(1); }
        }

        .counter-glow {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120%; height: 130%;
            background: radial-gradient(var(--accent-primary-glow) 0%, transparent 65%);
            z-index: -1;
            filter: blur(20px);
            transition: background 0.4s ease;
        }

        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 1.5rem; opacity: 0.8; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.75rem; }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-alpha);
            border-radius: 32px;
            padding: 2.5rem 2.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s var(--animation-curve), border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 10px 30px var(--shadow-intensity);
        }

        .stat-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--border-alpha-heavy);
            background: var(--bg-card-hover);
            box-shadow: 0 25px 50px var(--shadow-intensity);
        }

        .stat-card-border-track { position: absolute; top: 0; left: 0; width: 100%; height: 4px; opacity: 0.8; }
        .stat-card.births .stat-card-border-track { background: linear-gradient(90deg, #10b981, transparent 80%); }
        .stat-card.deaths .stat-card-border-track { background: linear-gradient(90deg, #ef4444, transparent 80%); }
        .stat-card.growth .stat-card-border-track { background: linear-gradient(90deg, var(--accent-primary), transparent 80%); }

        .stat-card h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .stat-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.75rem;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .stat-card.births .stat-number { color: #10b981; }
        .stat-card.deaths .stat-number { color: #f87171; }

        .stat-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: auto; font-weight: 500; }

        .tz-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
        
        .tz-card {
            background: var(--bg-card);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
        }
        .tz-card:hover { border-color: var(--accent-primary); background: var(--bg-card-hover); transform: translateY(-3px); }
        .tz-card.local-zone { border: 1px dashed var(--accent-primary); }
        .tz-card .zone-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
        .tz-card .zone-clock { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--text-main); margin: 0.5rem 0; letter-spacing: -0.5px; }
        .tz-card .zone-date { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .tz-card .zone-offset { position: absolute; top: 2rem; right: 2rem; background: var(--border-alpha-heavy); padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); }

        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 4, 9, 0.6);
            backdrop-filter: blur(8px);
            z-index: 150;
            opacity: 0; pointer-events: none;
            transition: all 0.4s ease;
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
        .sidebar {
            position: absolute;
            top: 0; left: -480px; width: 100%; max-width: 460px; height: 100%;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-alpha-heavy);
            box-shadow: 30px 0 60px var(--shadow-intensity);
            padding: 3rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            transition: left 0.4s var(--animation-curve);
        }
        .sidebar-overlay.open .sidebar { left: 0; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; }
        .ai-title { display: flex; align-items: center; gap: 0.75rem; font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; color: var(--text-main); }
        .ai-badge { background: var(--accent-primary-glow); color: var(--accent-primary); border: 1px solid var(--accent-primary); font-size: 0.65rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .ai-content-box { background: var(--bg-card); border: 1px solid var(--border-alpha); border-radius: 24px; padding: 1.5rem; flex: 1; overflow-y: auto; font-size: 0.9rem; }
        .ai-struct-item { margin-bottom: 1.25rem; border-bottom: 1px solid var(--border-alpha-heavy); padding-bottom: 1rem; }
        .ai-struct-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .ai-struct-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent-primary); letter-spacing: 1px; margin-bottom: 0.25rem; }
        .ai-struct-body { line-height: 1.5; color: var(--text-body); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 4, 9, 0.6);
            backdrop-filter: blur(16px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: all 0.4s var(--animation-curve);
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border-alpha-heavy);
            border-radius: 36px;
            padding: 2.5rem;
            width: 92%; max-width: 440px;
            transform: scale(0.92);
            transition: all 0.4s var(--animation-curve);
            box-shadow: 0 30px 60px var(--shadow-intensity);
        }
        .modal-overlay.open .modal { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-header h2 { font-size: 1.25rem; font-family: 'Space Grotesk', sans-serif; color: var(--text-main); }
        .close-btn { background: var(--bg-card); border: 1px solid var(--border-alpha-heavy); border-radius: 50%; width: 32px; height: 32px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .form-group { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .form-group.hidden { display: none !important; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .select-input { background: var(--bg-input); border: 1px solid var(--border-alpha-heavy); color: var(--text-main); padding: 1rem 1.25rem; border-radius: 16px; font-size: 0.95rem; outline: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat: no-repeat; background-position: right 1.25rem center; background-size: 16px; width: 100%; }

        footer { text-align: center; padding: 3rem 2rem; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border-alpha); background: rgba(3, 4, 9, 0.1); margin-top: auto; }

        @media (max-width: 768px) {
            header { padding: 1.25rem; gap: 1rem; justify-content: center; }
            .main-option-nav { order: 3; width: 100%; justify-content: center; }
            .container { padding: 0 1rem 3rem 1rem; gap: 2.5rem; }
            .toggle-container { width: 100%; max-width: 100%; flex-wrap: wrap; border-radius: 20px; }
            .toggle-slider { display: none; }
            .toggle-btn { flex: 1 1 30%; padding: 0.55rem 0; border-radius: 10px; font-size: 0.78rem; }
            .toggle-btn.active { background: var(--accent-primary); }
            .counter { font-size: clamp(2.2rem, 8.5vw, 4.2rem); }
            .sidebar { max-width: 100%; left: -100%; }
        }
    </style>
</head>
<body data-theme="dark" class="view-population">

    <div id="fps-hud">
        FPS: <span id="fps-val" class="val">0</span>
        <span class="separator">•</span>
        Memory: <span id="mem-val" class="val">--</span>
        <span class="separator">•</span>
        System: <span id="sys-val" class="val">Detecting...</span>
    </div>

    <header>
        <div class="header-left">
            <button class="ai-btn" onclick="toggleSidebar(true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg>
            </button>
            <div class="logo">Global<span>Metrics</span></div>
        </div>

        <nav class="main-option-nav">
            <div class="main-opt-slider"></div>
            <button id="opt-btn-pop" class="main-opt-btn active" onclick="switchMainOption('population')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span id="txt-opt-pop">Population</span>
            </button>
            <button id="opt-btn-tz" class="main-opt-btn" onclick="switchMainOption('timezone')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span id="txt-opt-tz">Fuso Horário</span>
            </button>
        </nav>

        <div class="header-actions">
            <div id="live-tag" class="live-indicator"><span class="dot"></span> LIVE METRICS</div>
            <button class="settings-btn" onclick="toggleModal(true)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        
        <section id="screen-population" class="app-view-screen active-screen">
            <div class="toggle-wrapper">
                <div class="toggle-container">
                    <div class="toggle-slider"></div>
                    <button id="tab-humans" class="toggle-btn" onclick="setMode('humans')">...</button>

        function detectSystemEnvironment() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android";
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS";
            if (/Macintosh|Mac OS X/i.test(ua)) return "macOS";
            if (/Linux/i.test(ua)) return "Linux";
            if (/Windows/i.test(ua)) return "Windows";
            return "WebBrowser";
        }

        function switchMainOption(targetView) {

            document.getElementById('screen-timezone').classList.toggle('active-screen', targetView === 'timezone');
            
            if(targetView === 'timezone') { renderTimezones(); }
        }

        function renderTimezones() {
            const wrapper = document.getElementById('tz-grid-wrapper');
            if (!wrapper) return;
            
            const locale = translationTable[currentLang].langLocale;
            const labelLocal = translationTable[currentLang].localLabel;
            
            let html = '';
            timezoneHubs.forEach(hub => {
                const now = new Date();
                let timeString, dateString, offsetString = '';
                let optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                let optionsDate = { weekday: 'short', month: 'short', day: 'numeric' };
                
                if(!hub.isLocal) {
                    optionsTime.timeZone = hub.zone;
                    optionsDate.timeZone = hub.zone;
                }
                
                timeString = now.toLocaleTimeString(locale, optionsTime);
                dateString = now.toLocaleDateString(locale, optionsDate);
                
                if(!hub.isLocal) {
                    try {
                        const parts = new Intl.DateTimeFormat(locale, { timeZone: hub.zone, timeZoneName: 'short' }).formatToParts(now);
                        const tzName = parts.find(p => p.type === 'timeZoneName');
                        offsetString = tzName ? tzName.value : '';
                    } catch(e) { offsetString = 'GMT'; }
                } else {
                    const offsetMin = -now.getTimezoneOffset();
                    const hours = Math.floor(Math.abs(offsetMin) / 60);
                    const mins = Math.abs(offsetMin) % 60;
                    offsetString = `GMT${offsetMin >= 0 ? '+' : '-'}${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
                }

                html += `
                    <div class="tz-card ${hub.isLocal ? 'local-zone' : ''}">
                        <div class="zone-offset">${offsetString}</div>
                        <div class="zone-title">${hub.isLocal ? labelLocal : hub.name}</div>
                        <div class="zone-clock">${timeString}</div>
                        <div class="zone-date">${dateString}</div>
                    </div>
                `;
            });
            wrapper.innerHTML = html;
        }

        // Custom FPS telemetry Engine Loop (Performance.memory allocation implementation)
        function toggleFpsHud(value) {
            showFps = (value === 'on');
            localStorage.setItem('cm_show_fps', value);
            document.getElementById('fps-hud').style.display = showFps ? 'block' : 'none';
        }

        function runPerformanceEngine(timestamp) {
            framesCount++;
            if (timestamp > lastFpsUpdate + 1000) {
                const currentFps = Math.round((framesCount * 1000) / (timestamp - lastFpsUpdate));
                
                if (showFps) {
                    document.getElementById('fps-val').innerText = currentFps;
                    
                    // Memory Calculation (V8/Chromium runtime engines specific optimization)
                    if (performance.memory) {
                        const activeMemoryUsed = (performance.memory.usedJSHeapSize / (1024 * 1024)).toFixed(1);
                        document.getElementById('mem-val').innerText = activeMemoryUsed + " MB";
                    } else {
                        document.getElementById('mem-val').innerText = "Unsupported";
                    }
                    
                    document.getElementById('sys-val').innerText = detectedOS;
                }
                
                framesCount = 0;
                lastFpsUpdate = timestamp;
            }
            requestAnimationFrame(runPerformanceEngine);
        }

        function detectMobileDevice() {
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isTouch || isMobileUA) {
                document.getElementById('battery-saving-group').classList.remove('hidden');
            }
        }

        function toggleModal(open) { document.getElementById('settings-modal').classList.toggle('open', open); }
        function toggleSidebar(open) { 
            document.getElementById('ai-sidebar').classList.toggle('open', open); 
            if(open) { renderAiContent(); }
        }

        function setTheme(theme) { 
            currentTheme = theme;
            localStorage.setItem('cm_theme', theme);
            document.body.setAttribute('data-theme', theme); 
        }

        function setBatterySaving(mode) {
            localStorage.setItem('cm_battery', mode);
            if(mode === 'on') {
                batterySavingActive = true;
                updateInterval = 500;
                document.body.classList.add('battery-saving');
            } else {
                batterySavingActive = false;
                updateInterval = 100;
                document.body.classList.remove('battery-saving');
            }
            switchMainOption(currentView);
            resetMetricTimer();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cm_lang', lang);
            const ui = translationTable[lang];
            
            document.getElementById('live-tag').innerHTML = ui.liveTag;
            document.getElementById('modal-title').innerText = ui.modalTitle;
            document.getElementById('label-lang').innerText = ui.labelLang;
            document.getElementById('label-theme').innerText = ui.labelTheme;
            document.getElementById('label-battery').innerText = ui.labelBattery;
            document.getElementById('label-growth').innerText = ui.labelGrowth;
            document.getElementById('meta-growth').innerText = ui.metaGrowth;
            document.getElementById('ai-title-text').innerText = ui.aiTitleText;
            document.getElementById('label-fps-toggle').innerText = ui.labelFpsToggle;
            
            document.getElementById('tab-humans').innerText = ui.tabHumans;
            document.getElementById('tab-dogs').innerText = ui.tabDogs;
            document.getElementById('tab-cats').innerText = ui.tabCats;
            document.getElementById('tab-rats').innerText = ui.tabRats;
            document.getElementById('tab-fishes').innerText = ui.tabFishes;
            
            document.getElementById('txt-opt-pop').innerText = ui.txtOptPop;
            document.getElementById('txt-opt-tz').innerText = ui.txtOptTz;
            document.getElementById('tz-heading').innerText = ui.tzHeading;
            document.getElementById('tz-subtitle').innerText = ui.tzSubtitle;

            renderTextContent();
        }

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem('cm_mode', mode);
            document.getElementById('tab-humans').classList.toggle('active', mode === 'humans');
            document.getElementById('tab-dogs').classList.toggle('active', mode === 'dogs');
            document.getElementById('tab-cats').classList.toggle('active', mode === 'cats');
            document.getElementById('tab-rats').classList.toggle('active', mode === 'rats');
            document.getElementById('tab-fishes').classList.toggle('active', mode === 'fishes');
            
            switchMainOption(currentView);
            renderTextContent();
        }

        function renderAiContent() {
            const aiData = datasets[currentMode].aiInsights[currentLang] || datasets[currentMode].aiInsights['en'];
            const labels = translationTable[currentLang].aiLabels;
            let html = `
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct1}</div>
                    <div class="ai-struct-body">${aiData[0] || '...'}</div>
                </div>
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct2}</div>
                    <div class="ai-struct-body">${aiData[1] || '...'}</div>
                </div>
                <div class="ai-struct-item">
                    <div class="ai-struct-label">${labels.struct3}</div>
                    <div class="ai-struct-body">${aiData[2] || '...'}</div>
                </div>
            `;
            document.getElementById('ai-content').innerHTML = html;
        }

        function renderTextContent() {
            const data = datasets[currentMode].translations[currentLang] || datasets[currentMode].translations['en'];
            document.getElementById('main-heading').innerText = data.heading;
            document.getElementById('main-subtitle').innerText = data.subtitle;
            document.getElementById('label-births').innerText = data.labelBirths;
            document.getElementById('label-deaths').innerText = data.labelDeaths;
            document.getElementById('meta-births').innerText = data.metaBirths;
            document.getElementById('meta-deaths').innerText = data.metaDeaths;
            document.getElementById('footer-text').innerHTML = data.footer || '';
            updateMetrics();
            if(currentView === 'timezone') { renderTimezones(); }
            if (document.getElementById('ai-sidebar').classList.contains('open')) { renderAiContent(); }
        }

        function formatNumber(num) {
            return Math.floor(num).toLocaleString(translationTable[currentLang].langLocale);
        }

        function updateMetrics() {
            if (currentView === 'population') {
                const data = datasets[currentMode];
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const secondsPassedToday = (now.getTime() - startOfDay) / 1000;

                const netGrowthPerSecond = data.birthsPerSecond - data.deathsPerSecond;
                const currentPopulation = data.basePopulation + (secondsPassedToday * netGrowthPerSecond);
                
                const birthsToday = secondsPassedToday * data.birthsPerSecond;
                const deathsToday = secondsPassedToday * data.deathsPerSecond;
                const growthToday = birthsToday - deathsToday;

                const counterEl = document.getElementById('main-counter');
                counterEl.innerText = formatNumber(currentPopulation);
                
                if(!batterySavingActive) {
                    counterEl.classList.remove('pulse-light');
                    void counterEl.offsetWidth; 
                    counterEl.classList.add('pulse-light');
                }

                document.getElementById('stat-births').innerText = formatNumber(birthsToday);
                document.getElementById('stat-deaths').innerText = formatNumber(deathsToday);
                document.getElementById('stat-growth').innerText = formatNumber(growthToday);
            } else if (currentView === 'timezone') {
                renderTimezones();
            }
        }

        let metricLoop;
        function resetMetricTimer() {
            clearInterval(metricLoop);
            metricLoop = setInterval(updateMetrics, updateInterval);
        }

        // Bootstrapping Engine Initialization
        window.addEventListener('DOMContentLoaded', () => {
            detectedOS = detectSystemEnvironment();
            detectMobileDevice();
            loadSavedConfiguration();
            setLanguage(currentLang);
            setMode(currentMode);
            resetMetricTimer();
            requestAnimationFrame(runPerformanceEngine);
        });
    </script>
</body>
</html>
